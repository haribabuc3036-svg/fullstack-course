<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height:200px;
            background-color: aqua;
            border:2px solid black;
        }
        .div-1{
             background-color: red;
             opacity: 0.7;
        }
        .div-2{
            position: absolute;
            background-color: blue;
            top:50px;
            left:50px;
            z-index: 3;
   
        }
        .div-3{
            background-color: black;
            opacity: 1;
            position: absolute;
            top:100px;
            left:100px;
            z-index:5
        }

        .div-5{
            position: fixed;
            top:0px;
            z-index: -4;

        }
        
        .div-6{
            position: relative;

        }
        span{
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: red;
            border-radius: 50%;
            text-align: center;
            right: 2px;
            /* top:2px; */
            /* left:2px; */
            bottom:2px;
            z-index: 1;
        }
    

    </style>
</head>
<body>
    
    <div class="div-1"></div>
    <div class="div-2"></div>
    <div class="div-3"></div>
    <div class="div-4"></div>
    <div class="div-5"></div>

    <div class="div-6">
        this is to show the notification
        <span>2</span>

    </div>
</body>
</html>
