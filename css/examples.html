<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            margin-bottom: 50px;
        }
        h2{
            margin-top:60px;
            margin-bottom:20px;
        }
        a{
            width:1000px;
            height: 500px;
            background-color: red;            
        }
        div{
            width:500px;
            max-width:200px;
            background-color: blue;
            height: 30px;
        }
        a{
            margin-left:100px;
            margin-top:100px;
            margin-bottom: 100px;
        }

        span{
            text-decoration: underline;
            padding:40px;
            border: 2px solid black;
            /* display: inline-block; */
        }        

    </style>
</head>
<body>
    <h1>This is heading 1</h1>
    <h2>This is heading 2</h2>
    <a href="">This is a link</a>
    <div></div>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Debitis nesciunt ratione sed unde suscipit, <span>this is a span </span>placeat obcaecati id aut, laudantium excepturi fugit beatae reiciendis corrupti labore neque expedita qui et odio.</p>

    <label for="fruit-choice">Choose a fruit:</label>
    <input list="fruits" id="fruit-choice" name="fruit-choice">
    <datalist id="fruits">
        <option value="Apple">
        <option value="Banana">
        <option value="Mango">
    </datalist>
    <input type="checkbox" name="" id="">

    
</body>
</html>
